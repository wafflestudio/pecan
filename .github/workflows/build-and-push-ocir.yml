name: build-and-push-ocir

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dockerfile:
        description: "Dockerfile name under ./docker (e.g. isolate.Dockerfile)"
        required: true
        type: string
        default: "isolate.Dockerfile"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04-arm

    env:
      IMAGE_TAG: ${{ github.ref_name }}
      OCIR_REGISTRY: yny.ocir.io
      OCIR_NAMESPACE: ax1dvc8vmenm
      OCIR_REPOSITORY: ${{ vars.OCIR_REPOSITORY }}
      DOCKERFILE_PATH: ${{ github.event_name == 'workflow_dispatch' && format('./docker/{0}', inputs.dockerfile) || './docker/isolate.Dockerfile' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to OCIR
        run: echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login "$OCIR_REGISTRY" -u "$OCIR_NAMESPACE/members/waffle-deployer" --password-stdin

      - name: Validate required values
        run: |
          test -n "$OCIR_REPOSITORY" || (echo "Repository variable OCIR_REPOSITORY is required." && exit 1)
          test -f "$DOCKERFILE_PATH" || (echo "Dockerfile not found: $DOCKERFILE_PATH" && exit 1)

      - name: Docker build, tag, and push image to OCIR
        run: |
          docker build \
            --platform linux/arm64 \
            -f "$DOCKERFILE_PATH" \
            -t "$OCIR_REGISTRY/$OCIR_NAMESPACE/$OCIR_REPOSITORY:$IMAGE_TAG" \
            .
          docker push "$OCIR_REGISTRY/$OCIR_NAMESPACE/$OCIR_REPOSITORY:$IMAGE_TAG"
