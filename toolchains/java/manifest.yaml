# /toolchains/java/manifest.yaml

language: java
version: "17"
method: tarball
install_prefix: "/opt/toolchains/java/17"

artifact_template:
  url: "https://corretto.aws/downloads/latest/amazon-corretto-{{version}}-{{java_arch}}-{{os}}-jdk.tar.gz"
  sha256_by_arch:
    x64: "d0f1b880445691425511c3aa62cb89889f03a71c2a43597a3df174fc01d3f3a0"
    aarch64: "1b9f75b5a2f740ab3305577858e2fc87dad827b60678d4573234d6357be59fa8"

binaries:
  - "bin/java"
  - "bin/javac"

set_default: true
alternatives:
  name: java
  links:
    java: "bin/java"
    javac: "bin/javac"

runtime_env:
  PATH_prepend:
    - "/opt/toolchains/java/current/bin"
